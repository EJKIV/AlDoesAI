<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Warm paper background -->
  <rect width="1200" height="630" fill="#f7f4ef"/>
  
  <!-- Subtle texture overlay -->
  <rect width="1200" height="630" fill="url(#grain)" opacity="0.4"/>
  
  <!-- Top accent border -->
  <rect x="0" y="0" width="1200" height="8" fill="#b03e10"/>
  
  <!-- Main content container -->
  <g transform="translate(80, 100)">
    <!-- Logo mark -->
    <g transform="translate(0, 0)">
      <text x="0" y="40" font-family="'DM Mono', monospace" font-size="16" fill="#3a3830" letter-spacing="0.08em">
        <tspan fill="#b03e10" font-weight="600">Al</tspan> Does AI
      </text>
      <rect x="0" y="55" width="1040" height="1" fill="#c8c3ba"/>
    </g>
    
    <!-- Date badge -->
    <g transform="translate(0, 90)">
      <text x="0" y="0" font-family="'DM Mono', monospace" font-size="14" fill="#b03e10" letter-spacing="0.12em">
        DAY 001 — MARCH 5, 2026
      </text>
    </g>
    
    <!-- Main title -->
    <g transform="translate(0, 160)">
      <text x="0" y="0" font-family="'Georgia', 'Fraunces', serif" font-size="72" fill="#1a1814" font-style="italic" font-weight="300">
        You Can
      </text>
      <text x="0" y="85" font-family="'Georgia', 'Fraunces', serif" font-size="72" fill="#b03e10" font-style="normal" font-weight="400">
        Speak It
      </text>
      <text x="330" y="85" font-family="'Georgia', 'Fraunces', serif" font-size="72" fill="#1a1814" font-style="italic" font-weight="300">
        Into Existence
      </text>
    </g>
    
    <!-- Subtitle -->
    <g transform="translate(0, 320)">
      <text x="0" y="0" font-family="'Georgia', serif" font-size="28" fill="#3a3830" font-weight="300">
        The gap between idea and output has collapsed.
      </text>
      <text x="0" y="42" font-family="'Georgia', serif" font-size="28" fill="#3a3830" font-weight="300">
        We're documenting the collapse in real-time.
      </text>
    </g>
    
    <!-- Bottom stats bar -->
    <g transform="translate(0, 440)">
      <rect x="0" y="0" width="1040" height="1" fill="#c8c3ba"/>
      <text x="0" y="40" font-family="'DM Mono', monospace" font-size="14" fill="#3a3830" letter-spacing="0.08em">
        $0 Invested
      </text>
      <text x="180" y="40" font-family="'DM Mono', monospace" font-size="14" fill="#3a3830" letter-spacing="0.08em">
        44 Commits
      </text>
      <text x="360" y="40" font-family="'DM Mono', monospace" font-size="14" fill="#3a3830" letter-spacing="0.08em">
        48 Files Created
      </text>
      <text x="600" y="40" font-family="'DM Mono', monospace" font-size="14" fill="#3a3830" letter-spacing="0.08em">
        100% Transparent
      </text>
    </g>
  </g>
  
  <!-- URL footer -->
  <text x="80" y="590" font-family="'DM Mono', monospace" font-size="14" fill="#3a3830" letter-spacing="0.05em">
    aldoesai.com
  </text>
  
  <!-- Decorative element - corner accent -->
  <g transform="translate(1120, 560)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#b03e10" stroke-width="2" opacity="0.3"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#b03e10" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="8" fill="#b03e10" opacity="0.2"/>
  </g>
  
  <!-- Definitions -->
  <defs>
    <pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse">
      <filter id="noise">
        <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/>
      </filter>
      <rect width="100" height="100" filter="url(#noise)" opacity="0.08"/>
    </pattern>
  </defs>
</svg>